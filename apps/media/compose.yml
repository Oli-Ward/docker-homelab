services:
  # Jellyfin - Media Server
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - 8096:8096
    networks:
      - media_net
      - proxy_net
    volumes:
      - ${APPDATA_ROOT}/jellyfin:/config
      - ${DATA_ROOT}/media/tv:/data/tv
      - ${DATA_ROOT}/media/movies:/data/movies
      - /home/oli/docker/ssl/home-lab-root.crt:/usr/local/share/ca-certificates/home-lab-root.crt:ro
    entrypoint: [ "/bin/sh", "-c", "update-ca-certificates && exec /init" ]
    restart: unless-stopped
    extra_hosts:
      - "auth.home.lab:192.168.1.103"
      - "authentik.home.lab:192.168.1.103"

  # Seerr - Request Management
  seerr:
    image: ghcr.io/seerr-team/seerr:preview-new-oidc
    init: true
    container_name: seerr
    networks:
      - media_net
      - proxy_net
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
      - PORT=5055
      - NODE_EXTRA_CA_CERTS=/usr/local/share/ca-certificates/home-lab-root.crt
    volumes:
      - ${APPDATA_ROOT}/jellyseerr:/app/config
      - /home/oli/docker/ssl/home-lab-root.crt:/usr/local/share/ca-certificates/home-lab-root.crt:ro
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped

  # Ryot - Media Tracker
  ryot:
    image: ignisda/ryot:v10
    container_name: ryot
    depends_on:
      - ryot-db
    networks:
      - media_net
      - proxy_net
    environment:
      - TZ=${TZ}
      - FRONTEND_URL=${RYOT_FRONTEND_URL}
      - DATABASE_URL=postgres://${RYOT_POSTGRES_USER}:${RYOT_POSTGRES_PASSWORD}@ryot-db:5432/${RYOT_POSTGRES_DB}
      - SERVER_ADMIN_ACCESS_TOKEN=${RYOT_SERVER_ADMIN_ACCESS_TOKEN}
      - MOVIES_AND_SHOWS_TMDB_ACCESS_TOKEN=${RYOT_TMDB_ACCESS_TOKEN}
      - DISABLE_TELEMETRY=${RYOT_DISABLE_TELEMETRY}
      - USERS_ALLOW_REGISTRATION=${RYOT_USERS_ALLOW_REGISTRATION}
      - USERS_DISABLE_LOCAL_AUTH=${RYOT_USERS_DISABLE_LOCAL_AUTH:-false}
      - SERVER_OIDC_CLIENT_ID=${RYOT_OIDC_CLIENT_ID}
      - SERVER_OIDC_CLIENT_SECRET=${RYOT_OIDC_CLIENT_SECRET}
      - SERVER_OIDC_ISSUER_URL=${RYOT_OIDC_ISSUER_URL}
      - FRONTEND_OIDC_BUTTON_LABEL=${RYOT_OIDC_BUTTON_LABEL}
      - SSL_CERT_FILE=/usr/local/share/ca-certificates/home-lab-root.crt
      - NODE_EXTRA_CA_CERTS=/usr/local/share/ca-certificates/home-lab-root.crt
    volumes:
      - /home/oli/docker/ssl/home-lab-root.crt:/usr/local/share/ca-certificates/home-lab-root.crt:ro
    extra_hosts:
      - "auth.home.lab:192.168.1.103"
      - "authentik.home.lab:192.168.1.103"
    restart: unless-stopped

  # Ryot Postgres - Media Tracker Database
  ryot-db:
    image: postgres:18-alpine
    container_name: ryot-db
    networks:
      - media_net
    environment:
      - TZ=${TZ}
      - POSTGRES_DB=${RYOT_POSTGRES_DB}
      - POSTGRES_USER=${RYOT_POSTGRES_USER}
      - POSTGRES_PASSWORD=${RYOT_POSTGRES_PASSWORD}
    volumes:
      - ${APPDATA_ROOT}/ryot-postgres:/var/lib/postgresql
    restart: unless-stopped

  # Tdarr - Media health checks and transcoding evaluation
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK_SET=002
      - serverIP=0.0.0.0
      - serverPort=${TDARR_SERVER_PORT}
      - webUIPort=${TDARR_WEBUI_PORT}
      - internalNode=${TDARR_INTERNAL_NODE}
      - inContainer=true
      - ffmpegVersion=7
      - nodeName=${TDARR_NODE_NAME}
      - auth=false
      - openBrowser=false
      - maxLogSizeMB=10
    volumes:
      - ${APPDATA_ROOT}/tdarr/server:/app/server
      - ${APPDATA_ROOT}/tdarr/configs:/app/configs
      - ${APPDATA_ROOT}/tdarr/logs:/app/logs
      - ${TDARR_TEST_LIBRARY_PATH}:/media:rw
      - ${TDARR_TRANSCODE_CACHE_PATH}:/temp
    networks:
      - media_net
      - proxy_net
    restart: unless-stopped

networks:
  media_net:
    external: true
  proxy_net:
    external: true
