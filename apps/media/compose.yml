services:
  # Jellyfin - Media Server
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - 8096:8096
    networks:
      - media_net
      - proxy_net
    volumes:
      - ${APPDATA_ROOT}/jellyfin:/config
      - ${DATA_ROOT}/media/tv:/data/tv
      - ${DATA_ROOT}/media/movies:/data/movies
      - /home/oli/docker/ssl/home-lab-root.crt:/usr/local/share/ca-certificates/home-lab-root.crt:ro
    entrypoint: [ "/bin/sh", "-c", "update-ca-certificates && exec /init" ]
    restart: unless-stopped
    extra_hosts:
      - "auth.home.lab:192.168.1.103"
      - "authentik.home.lab:192.168.1.103"

  # Jellyseerr - Request Management
  jellyseerr:
    image: fallenbagel/jellyseerr:preview-OIDC
    container_name: jellyseerr
    networks:
      - media_net
      - proxy_net
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
      - NODE_EXTRA_CA_CERTS=/usr/local/share/ca-certificates/home-lab-root.crt
    volumes:
      - ${APPDATA_ROOT}/jellyseerr:/app/config
      - /home/oli/docker/ssl/home-lab-root.crt:/usr/local/share/ca-certificates/home-lab-root.crt:ro
    restart: unless-stopped

  # Ryot - Media Tracker
  ryot:
    image: ignisda/ryot:v10
    container_name: ryot
    depends_on:
      - ryot-db
    networks:
      - media_net
      - proxy_net
    environment:
      - TZ=${TZ}
      - FRONTEND_URL=${RYOT_FRONTEND_URL}
      - DATABASE_URL=postgres://${RYOT_POSTGRES_USER}:${RYOT_POSTGRES_PASSWORD}@ryot-db:5432/${RYOT_POSTGRES_DB}
      - SERVER_ADMIN_ACCESS_TOKEN=${RYOT_SERVER_ADMIN_ACCESS_TOKEN}
      - MOVIES_AND_SHOWS_TMDB_ACCESS_TOKEN=${RYOT_TMDB_ACCESS_TOKEN}
      - DISABLE_TELEMETRY=${RYOT_DISABLE_TELEMETRY}
      - USERS_ALLOW_REGISTRATION=${RYOT_USERS_ALLOW_REGISTRATION}
      - SERVER_OIDC_CLIENT_ID=${RYOT_OIDC_CLIENT_ID}
      - SERVER_OIDC_CLIENT_SECRET=${RYOT_OIDC_CLIENT_SECRET}
      - SERVER_OIDC_ISSUER_URL=${RYOT_OIDC_ISSUER_URL}
      - FRONTEND_OIDC_BUTTON_LABEL=${RYOT_OIDC_BUTTON_LABEL}
    restart: unless-stopped

  # Ryot Postgres - Media Tracker Database
  ryot-db:
    image: postgres:18-alpine
    container_name: ryot-db
    networks:
      - media_net
    environment:
      - TZ=${TZ}
      - POSTGRES_DB=${RYOT_POSTGRES_DB}
      - POSTGRES_USER=${RYOT_POSTGRES_USER}
      - POSTGRES_PASSWORD=${RYOT_POSTGRES_PASSWORD}
    volumes:
      - ${APPDATA_ROOT}/ryot-postgres:/var/lib/postgresql
    restart: unless-stopped

networks:
  media_net:
    external: true
  proxy_net:
    external: true
