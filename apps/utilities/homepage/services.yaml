---

# Metrics
- Metrics:
    - Containers:
        widget:
          type: glances
          url: http://glances:61208
          metric: containers
          refreshInterval: 5000
          version: 4

    - Top Processes:
        widget:
          type: glances
          url: http://glances:61208
          metric: process
          refreshInterval: 5000
          version: 4

    - Speedtest:
        widget:
          type: speedtest
          url: http://speedtest-tracker:80
          version: 2
          key: "{{HOMEPAGE_VAR_SPEEDTEST_API_KEY}}"
          bitratePrecision: 3

    - CPU Usage:
        widget:
          type: glances
          url: http://glances:61208
          metric: cpu
          chart: true
          refreshInterval: 5000
          version: 4

    - Memory Usage:
        widget:
          type: glances
          url: http://glances:61208
          metric: memory
          chart: true
          refreshInterval: 5000
          version: 4

    - Network Usage:
        widget:
          type: glances
          url: http://glances:61208
          metric: network:eth0
          chart: true
          refreshInterval: 5000
          version: 4

    - Disk I/O:
        widget:
          type: glances
          url: http://glances:61208
          metric: disk:sda
          refreshInterval: 5000
          version: 4

