services:
  # qBittorrent - Torrent Client
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA_ROOT}/qbittorrent:/config
      - ${DATA_ROOT}/downloads:/downloads
    network_mode: "service:gluetun"
    restart: unless-stopped
    depends_on:
      - gluetun

  # NZBGet - Usenet Client
  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA_ROOT}/nzbget:/config
      - ${DATA_ROOT}/downloads:/downloads
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun

  # FlareSolverr - Cloudflare Bypass
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    mem_limit: 1g
    memswap_limit: 1g
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    volumes:
      - ${APPDATA_ROOT}/flaresolverr:/config
    restart: unless-stopped
    networks:
      - vpn_net
      - media_net

  # Gluetun - torrent protection
  gluetun:
    image: qmcgaw/gluetun:latest
    init: true
    container_name: gluetun
    networks:
      - vpn_net
      - media_net
      - proxy_net
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8080:8080 # qBittorrent web UI
      - 6789:6789 # NZBGet web UI
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_CITIES=${SERVER_CITIES}
      - TZ=${TZ}
      - HTTPPROXY=${HTTPPROXY}
      - SHADOWSOCKS=${SHADOWSOCKS}
      - HTTP_CONTROL_SERVER_ADDRESS=${HTTP_CONTROL_SERVER_ADDRESS}
      - HTTP_CONTROL_SERVER_AUTH=${HTTP_CONTROL_SERVER_AUTH}
      - HTTP_CONTROL_SERVER_LOG=${HTTP_CONTROL_SERVER_LOG}
      - HTTP_CONTROL_SERVER_AUTH_DEFAULT_ROLE=${HTTP_CONTROL_SERVER_AUTH_DEFAULT_ROLE}
    volumes:
      - ${APPDATA_ROOT}/gluetun:/gluetun
    restart: unless-stopped

networks:
  vpn_net:
    external: true
  media_net:
    external: true
  proxy_net:
    external: true
