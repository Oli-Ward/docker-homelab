services:
  # Home page for services
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    volumes:
      - ./homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DATA_ROOT}:/data:ro
      - /home/oli/docker/ssl/home-lab-root.crt:/usr/local/share/ca-certificates/home-lab-root.crt:ro
    networks:
      - utilities_net
      - proxy_net
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - HOMEPAGE_ALLOWED_HOSTS=${HOMEPAGE_ALLOWED_HOSTS}
      - HOMEPAGE_VAR_TITLE=${HOMEPAGE_VAR_TITLE}
      - HOMEPAGE_VAR_SPEEDTEST_API_KEY=${HOMEPAGE_VAR_SPEEDTEST_API_KEY}
      - HOMEPAGE_VAR_JELLYFIN_API_KEY=${HOMEPAGE_VAR_JELLYFIN_API_KEY}
      - HOMEPAGE_VAR_QBITTORRENT_PASSWORD=${HOMEPAGE_VAR_QBITTORRENT_PASSWORD}
      - HOMEPAGE_VAR_NZBGET_PASSWORD=${HOMEPAGE_VAR_NZBGET_PASSWORD}
      - HOMEPAGE_VAR_SEERR_API_KEY=${HOMEPAGE_VAR_SEERR_API_KEY}
      - HOMEPAGE_VAR_PROWLARR_API_KEY=${HOMEPAGE_VAR_PROWLARR_API_KEY}
      - HOMEPAGE_VAR_RADARR_API_KEY=${HOMEPAGE_VAR_RADARR_API_KEY}
      - HOMEPAGE_VAR_SONARR_API_KEY=${HOMEPAGE_VAR_SONARR_API_KEY}
      - HOMEPAGE_VAR_BAZARR_API_KEY=${HOMEPAGE_VAR_BAZARR_API_KEY}
      - HOMEPAGE_VAR_KOMODO_API_KEY=${HOMEPAGE_VAR_KOMODO_API_KEY}
      - HOMEPAGE_VAR_KOMODO_API_SECRET=${HOMEPAGE_VAR_KOMODO_API_SECRET}
      - HOMEPAGE_VAR_TAILSCALE_API_KEY=${HOMEPAGE_VAR_TAILSCALE_API_KEY}
      - HOMEPAGE_VAR_ADGUARD_PASSWORD=${HOMEPAGE_VAR_ADGUARD_PASSWORD}
      - HOMEPAGE_VAR_AUTHENTIK_API_KEY=${HOMEPAGE_VAR_AUTHENTIK_API_KEY}
      - HOMEPAGE_VAR_NPM_PASSWORD=${HOMEPAGE_VAR_NPM_PASSWORD}
      - HOMEPAGE_VAR_CLEANUPARR_API_KEY=${HOMEPAGE_VAR_CLEANUPARR_API_KEY}
      - HOMEPAGE_VAR_PAPERLESS_PASSWORD=${HOMEPAGE_VAR_PAPERLESS_PASSWORD}
    restart: unless-stopped

  # Backrest - Restic backup management
  backrest:
    image: ghcr.io/garethgeorge/backrest:latest
    container_name: backrest
    hostname: backrest
    environment:
      - TZ=${TZ}
      - BACKREST_DATA=/data
      - BACKREST_CONFIG=/config/config.json
      - XDG_CACHE_HOME=/cache
      - TMPDIR=/tmp
    volumes:
      - ${APPDATA_ROOT}/backrest/data:/data
      - ${APPDATA_ROOT}/backrest/config:/config
      - ${APPDATA_ROOT}/backrest/cache:/cache
      - ${APPDATA_ROOT}/backrest/tmp:/tmp
      - ${APPDATA_ROOT}/backrest/rclone:/root/.config/rclone
      - ${BACKREST_SOURCE_APPDATA_HOST_PATH:-/srv/appdata}:/userdata/appdata:ro
      - /home/oli/docker:/userdata/docker-repo:ro
      - ${BACKREST_RESTIC_REPO_HOST_PATH:-/mnt/backup/restic}:/repos
    networks:
      - utilities_net
      - proxy_net
    restart: unless-stopped

  # Get system data with glances
  glances:
    image: nicolargo/glances:latest
    init: true
    container_name: glances
    restart: unless-stopped
    pid: host
    privileged: true
    networks:
      - utilities_net
      - proxy_net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${APPDATA_ROOT}/glances:/glances/conf
    environment:
      - TZ=${TZ}
      - GLANCES_OPT=-w

  icloudpd:
    image: icloudpd/icloudpd:latest
    container_name: icloudpd
    restart: unless-stopped
    networks:
      - utilities_net
    environment:
      - TZ=${TZ}
    volumes:
      - ${DATA_ROOT}/media/Photos:/data
      - ${APPDATA_ROOT}/icloudpd:/config
    stdin_open: true
    tty: true
    command:
      - icloudpd
      - --directory
      - /data
      - --username
      - ${ICLOUD_USERNAME}
      - --cookie-directory
      - /config
      - --folder-structure
      - "{:%Y/%m}"
      - --set-exif-datetime
      - --align-raw
      - original
      - --live-photo-size
      - original

  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    restart: unless-stopped
    networks:
      - proxy_net
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - APP_TIMEZONE=${TZ}
      - DISPLAY_TIMEZONE=${TZ}
      - APP_KEY=${SPEEDTEST_KEY}
      - APP_URL=${SPEEDTEST_APP_URL}
      - DB_CONNECTION=sqlite
      - SPEEDTEST_SCHEDULE=17 * * * *
    volumes:
      - ${APPDATA_ROOT}/speedtest-tracker:/config

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    mem_limit: 1g
    memswap_limit: 1g
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_HOST=n8n.home.lab
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.home.lab/
      - N8N_EDITOR_BASE_URL=https://n8n.home.lab/
      - N8N_SECURE_COOKIE=true
      - NODES_EXCLUDE=${NODES_EXCLUDE:-[]}
      - OPENCLAW_SSH_HOST=${OPENCLAW_SSH_HOST:-192.168.1.16}
      - OPENCLAW_SSH_USER=${OPENCLAW_SSH_USER:-openclaw}
      - OPENCLAW_SSH_PORT=${OPENCLAW_SSH_PORT:-22}
      - OPENCLAW_SSH_KEY_PATH=${OPENCLAW_SSH_KEY_PATH:-/home/node/.n8n/ssh/openclaw_lab_tunnel}
      - OPENCLAW_WORKSPACE=${OPENCLAW_WORKSPACE:-/home/openclaw/.openclaw/workspace}
      - OPENCLAW_RATING_PROMPT_DB=${OPENCLAW_RATING_PROMPT_DB:-tracking/jellyfin-rating-prompts/rating-prompts.sqlite}
      - LINEAR_OPENCLAW_WEBHOOK_SECRET=${LINEAR_OPENCLAW_WEBHOOK_SECRET:?Set LINEAR_OPENCLAW_WEBHOOK_SECRET in Komodo or n8n runtime config}
      - OPENCLAW_LINEAR_HANDOFF_COMMAND=${OPENCLAW_LINEAR_HANDOFF_COMMAND:-tools/bin/openclaw-linear-n8n-handoff}
      - OPENCLAW_PLANE_DISPATCH_COMMAND=${OPENCLAW_PLANE_DISPATCH_COMMAND:-tools/bin/openclaw-plane-n8n-dispatch}
    volumes:
      - ${APPDATA_ROOT}/n8n:/home/node/.n8n
      - ./n8n/scripts:/opt/n8n-scripts:ro
      - ${OPENCLAW_SSH_KEY_PATH_HOST:-/home/oli/.ssh/openclaw/openclaw_lab_tunnel}:${OPENCLAW_SSH_KEY_PATH:-/home/node/.n8n/ssh/openclaw_lab_tunnel}:ro
    networks:
      - utilities_net
      - proxy_net

networks:
  utilities_net:
    external: true
  proxy_net:
    external: true
