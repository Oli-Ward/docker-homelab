services:
  # Radarr - Movie Management
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA_ROOT}/radarr:/config
      - ${DATA_ROOT}/media/movies:/movies
      - ${DATA_ROOT}/downloads:/downloads
    restart: unless-stopped
    networks:
      - media_net
      - proxy_net

  # Sonarr - TV Management
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA_ROOT}/sonarr:/config
      - ${DATA_ROOT}/media/tv:/tv
      - ${DATA_ROOT}/downloads:/downloads
    restart: unless-stopped
    networks:
      - media_net
      - proxy_net

  # Prowlarr - Indexer Manager
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA_ROOT}/prowlarr:/config
    restart: unless-stopped
    networks:
      - media_net
      - proxy_net

  # Bazarr - Subtitle Management
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA_ROOT}/bazarr:/config
      - ${DATA_ROOT}/media/tv:/tv
      - ${DATA_ROOT}/media/movies:/movies
    restart: unless-stopped
    networks:
      - media_net
      - proxy_net

  # Bazarr Sync - one-off subtitle sync helper, trigger manually via Komodo
  bazarr-sync:
    image: ghcr.io/ajmandourah/bazarr-sync:latest
    container_name: bazarr-sync
    profiles:
      - manual
    environment:
      - BAZARR_SYNC_URL=${BAZARR_SYNC_URL}
      - BAZARR_SYNC_API_TOKEN=${BAZARR_SYNC_API_TOKEN}
    command:
      - sh
      - -c
      - |
        set -eu
        printf '%s\n' \
          "bazarr_url: $${BAZARR_SYNC_URL}" \
          "bazarr_token: $${BAZARR_SYNC_API_TOKEN}" \
          > /tmp/bazarr-sync.yaml
        status=0
        bazarr-sync --config /tmp/bazarr-sync.yaml sync movies || status=$$?
        bazarr-sync --config /tmp/bazarr-sync.yaml sync shows || status=$$?
        exit $$status
    restart: "no"
    depends_on:
      - bazarr
    networks:
      - media_net

  # Maintainerr - Watched media cleanup
  maintainerr:
    image: ghcr.io/maintainerr/maintainerr:latest
    container_name: maintainerr
    user: "${PUID}:${PGID}"
    environment:
      - TZ=${TZ}
    volumes:
      - ${APPDATA_ROOT}/maintainerr:/opt/data
    restart: unless-stopped
    networks:
      - media_net
      - proxy_net

  # Seekarr - missing media search automation helper
  seekarr:
    image: ghcr.io/tumeden/seekarr:latest
    container_name: seekarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${APPDATA_ROOT}/seekarr:/data
    restart: unless-stopped
    networks:
      - media_net
      - proxy_net

  # Autoscan - Library Scanner
  autoscan:
    image: ghcr.io/niniyas/autoscan:latest
    container_name: autoscan
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=002
      - TZ=${TZ}
    volumes:
      - ${APPDATA_ROOT}/autoscan:/config
      - ${DATA_ROOT}/media/tv:/tv
      - ${DATA_ROOT}/media/movies:/movies
    restart: unless-stopped
    networks:
      - media_net    

  # Mediastarr - Missing content and upgrade search helper
  mediastarr:
    image: kroeberd/mediastarr:latest
    container_name: mediastarr
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - SONARR_URL=${MEDIASTARR_SONARR_URL}
      - RADARR_URL=${MEDIASTARR_RADARR_URL}
      - SONARR_API_KEY=${MEDIASTARR_SONARR_API_KEY}
      - RADARR_API_KEY=${MEDIASTARR_RADARR_API_KEY}
      - DISCORD_WEBHOOK_URL=${MEDIASTARR_DISCORD_WEBHOOK_URL}
    volumes:
      - ${APPDATA_ROOT}/mediastarr:/data
    restart: unless-stopped
    networks:
      - media_net
      - proxy_net

  # Recyclarr - Sonarr/Radarr quality profile sync
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:8
    container_name: recyclarr
    user: "${PUID}:${PGID}"
    environment:
      - TZ=${TZ}
      - SONARR_API_KEY=${RECYCLARR_SONARR_API_KEY}
      - RADARR_API_KEY=${RECYCLARR_RADARR_API_KEY}
    volumes:
      - ${APPDATA_ROOT}/recyclarr:/config
    restart: unless-stopped
    networks:
      - media_net

  # Cleanuparr - Cleanup Tool
  cleanuparr:
    image: ghcr.io/cleanuparr/cleanuparr:latest
    container_name: cleanuparr
    environment:
      - PORT=11011
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=022
      - TZ=${TZ}
    volumes:
      - ${APPDATA_ROOT}/cleanuparr:/config
      - /home/oli/docker/ssl/home-lab-root.crt:/usr/local/share/ca-certificates/home-lab-root.crt:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11011/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - media_net
      - proxy_net
      
networks:
  media_net:
    external: true
  proxy_net:
    external: true
