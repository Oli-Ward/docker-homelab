services:
  openclaw-gateway:
    build:
      context: ../..
      dockerfile: apps/openclaw-gateway/openclaw-gateway/Dockerfile
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_BIND_HOST:?Set GATEWAY_BIND_HOST to the media host LAN IP}:${GATEWAY_PORT:-8088}:8080"
    environment:
      - GATEWAY_AUTH_TOKEN=${GATEWAY_AUTH_TOKEN:?Set GATEWAY_AUTH_TOKEN in Komodo or apps/openclaw-gateway/.env}
      - JELLYFIN_URL=${JELLYFIN_URL:-http://jellyfin:8096}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:?Set JELLYFIN_API_KEY in Komodo or apps/openclaw-gateway/.env}
      - SEERR_URL=http://seerr:5055
      - SEERR_API_KEY=${SEERR_API_KEY:?Set SEERR_API_KEY in Komodo or apps/openclaw-gateway/.env}
      - SONARR_URL=${SONARR_URL:-http://sonarr:8989}
      - SONARR_API_KEY=${SONARR_API_KEY:?Set SONARR_API_KEY in Komodo or apps/openclaw-gateway/.env}
      - RADARR_URL=${RADARR_URL:-http://radarr:7878}
      - RADARR_API_KEY=${RADARR_API_KEY:?Set RADARR_API_KEY in Komodo or apps/openclaw-gateway/.env}
      - RYOT_URL=${RYOT_URL:-http://ryot:8000}
      - RYOT_ADMIN_ACCESS_TOKEN=${RYOT_ADMIN_ACCESS_TOKEN:?Set RYOT_ADMIN_ACCESS_TOKEN in Komodo or apps/openclaw-gateway/.env}
      - PLANE_API_BASE_URL=${PLANE_API_BASE_URL:-https://plane.home.lab}
      - PLANE_API_KEY=${PLANE_API_KEY:?Set PLANE_API_KEY in Komodo or apps/openclaw-gateway/.env}
      - PLANE_WORKSPACE_SLUG=${PLANE_WORKSPACE_SLUG:?Set PLANE_WORKSPACE_SLUG in Komodo or apps/openclaw-gateway/.env}
      - SSL_CERT_FILE=${SSL_CERT_FILE:-/usr/local/share/ca-certificates/home-lab-root.crt}
      - REQUESTS_CA_BUNDLE=${REQUESTS_CA_BUNDLE:-/usr/local/share/ca-certificates/home-lab-root.crt}
      - PLANE_DEFAULT_PROJECT_ID=${PLANE_DEFAULT_PROJECT_ID:-}
      - PLANE_WEBHOOK_SECRET=${PLANE_WEBHOOK_SECRET:-}
      - PLANE_WEBHOOK_QUEUE_BACKEND=${PLANE_WEBHOOK_QUEUE_BACKEND:-redis}
      - PLANE_WEBHOOK_REDIS_URL=${PLANE_WEBHOOK_REDIS_URL:-redis://openclaw-gateway-redis:6379/0}
      - PLANE_WEBHOOK_REDIS_PREFIX=${PLANE_WEBHOOK_REDIS_PREFIX:-openclaw:plane:webhooks}
      - PLANE_WEBHOOK_MAX_ATTEMPTS=${PLANE_WEBHOOK_MAX_ATTEMPTS:-5}
      - PLANE_WEBHOOK_RETRY_BASE_SECONDS=${PLANE_WEBHOOK_RETRY_BASE_SECONDS:-30}
      - PLANE_WEBHOOK_RETRY_MAX_SECONDS=${PLANE_WEBHOOK_RETRY_MAX_SECONDS:-1800}
      - PLANE_WEBHOOK_QUEUE_PATH=${PLANE_WEBHOOK_QUEUE_PATH:-/app/state/plane-webhooks/events.jsonl}
      - PLANE_WEBHOOK_DEDUPE_PATH=${PLANE_WEBHOOK_DEDUPE_PATH:-}
      - PLANE_WEBHOOK_IGNORED_ACTOR_IDS=${PLANE_WEBHOOK_IGNORED_ACTOR_IDS:-}
      - N8N_WEBHOOK_BASE_URL=${N8N_WEBHOOK_BASE_URL:-http://n8n:5678}
      - N8N_OPENCLAW_SMOKE_PATH=${N8N_OPENCLAW_SMOKE_PATH:-/webhook/openclaw-smoke}
      - N8N_JELLYFIN_RATING_PROMPT_PATH=${N8N_JELLYFIN_RATING_PROMPT_PATH:-/webhook/jellyfin-rating-prompt}
      - N8N_PLANE_WEBHOOK_DISPATCH_PATH=${N8N_PLANE_WEBHOOK_DISPATCH_PATH:-/webhook/plane-openclaw-dispatch}
      - UPSTREAM_TIMEOUT_SECONDS=15
    volumes:
      - ${HOMELAB_CA_CERT_HOST_PATH:-/home/oli/docker/ssl/home-lab-root.crt}:${SSL_CERT_FILE:-/usr/local/share/ca-certificates/home-lab-root.crt}:ro
      - ${APPDATA_ROOT:?Set APPDATA_ROOT to the appdata root}/openclaw-gateway:/app/state
    networks:
      - gateway_net
      - media_net
      - utilities_net

  openclaw-gateway-redis:
    image: redis:8.2.7
    container_name: openclaw-gateway-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${APPDATA_ROOT:?Set APPDATA_ROOT to the appdata root}/openclaw-gateway/redis:/data
    networks:
      - gateway_net

networks:
  gateway_net:
  media_net:
    external: true
  utilities_net:
    external: true
