services:
  # Jellyfin - Media Server
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    networks:
      - media_net
      - proxy_net
    volumes:
      - ${DATA_ROOT}/configs/jellyfin:/config
      - ${DATA_ROOT}/media/tv:/data/tv
      - ${DATA_ROOT}/media/movies:/data/movies
      - ${DATA_ROOT}/media/books:/data/books
      - ${DATA_ROOT}/downloads:/data/downloads
      - /home/oli/docker/ssl/home-lab-root.crt:/usr/local/share/ca-certificates/home-lab-root.crt:ro
    entrypoint: ["/bin/sh", "-c", "update-ca-certificates && exec /init"]
    restart: unless-stopped

# Jellyseerr - Request Management
  jellyseerr:
    image: fallenbagel/jellyseerr:preview-OIDC
    container_name: jellyseerr
    networks:
      - media_net
      - proxy_net
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
      - NODE_EXTRA_CA_CERTS=/usr/local/share/ca-certificates/home-lab-root.crt
    volumes:
      - ${DATA_ROOT}/configs/jellyseerr:/app/config
      - /home/oli/docker/ssl/home-lab-root.crt:/usr/local/share/ca-certificates/home-lab-root.crt:ro     
    restart: unless-stopped

networks:
  media_net:
    external: true
  proxy_net:
    external: true