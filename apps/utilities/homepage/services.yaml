# Download Management
- Download Management:
    - Prowlarr:
        icon: prowlarr.png
        href: https://prowlarr.home.lab
        description: Indexers
        widget:
          type: prowlarr
          url: http://prowlarr:9696
          key: "{{HOMEPAGE_VAR_PROWLARR_API_KEY}}"

    - Radarr:
        icon: radarr.png
        href: https://radarr.home.lab
        description: Movies
        widget:
          type: radarr
          url: http://radarr:7878
          key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"

    - Sonarr:
        icon: sonarr.png
        href: https://sonarr.home.lab
        description: TV Shows
        widget:
          type: sonarr
          url: http://sonarr:8989
          key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"

    - Bazarr:
        icon: bazarr.png
        href: https://bazarr.home.lab
        description: Subtitles
        widget:
          type: bazarr
          url: http://bazarr:6767
          key: "{{HOMEPAGE_VAR_BAZARR_API_KEY}}"
          missingEpisodes: true
          missingMovies: true

    - Cleanuparr:
        icon: mdi-broom
        href: https://cleanup.home.lab
        description: Cleanup
        widget:
          type: customapi
          url: http://cleanuparr:11011/api/stats
          headers:
            X-Api-Key: "{{HOMEPAGE_VAR_CLEANUPARR_API_KEY}}"
          mappings:
              - field: events.totalCount
                label: Events (24h)
                format: number
              - field: strikes.totalCount
                label: Strikes (24h)
                format: number
              - field: strikes.itemsRemoved
                label: Removed
                format: number

    - Ryot:
        icon: mdi-movie-open-star
        href: https://ryot.home.lab
        description: Media Tracker
        siteMonitor: http://ryot:8000/health

    - Tdarr:
        icon: tdarr.png
        href: https://tdarr.home.lab
        description: Media health checks and transcoding
        siteMonitor: http://tdarr:8265

    - Maintainerr:
        icon: mdi-delete-clock
        href: https://maintainerr.home.lab
        description: Watched media cleanup
        siteMonitor: http://maintainerr:6246/api/health/ready

