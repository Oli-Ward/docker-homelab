services:
  # Gluetun - torrent protection
  gluetun:
    image: qmcgaw/gluetun:latest
    init: true
    container_name: gluetun
    networks:
      - vpn_net
      - media_net
      - proxy_net
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_CITIES=${SERVER_CITIES}
      - TZ=${TZ}
      - HTTPPROXY=${HTTPPROXY}
      - SHADOWSOCKS=${SHADOWSOCKS}
      - HTTP_CONTROL_SERVER_ADDRESS=${HTTP_CONTROL_SERVER_ADDRESS}
      - HTTP_CONTROL_SERVER_AUTH=${HTTP_CONTROL_SERVER_AUTH}
      - HTTP_CONTROL_SERVER_LOG=${HTTP_CONTROL_SERVER_LOG}
      - HTTP_CONTROL_SERVER_AUTH_DEFAULT_ROLE=${HTTP_CONTROL_SERVER_AUTH_DEFAULT_ROLE}
    volumes:
      - ${DATA_ROOT}/configs/gluetun:/gluetun
    restart: unless-stopped

networks:
  vpn_net:
    external: true
  media_net:
    external: true
  proxy_net:
    external: true